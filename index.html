    <link rel="canonical" href="https://autoceny.eu/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Autoceny — Wyceny Napraw Samochodowych od Warsztatów" />

    <meta name="twitter:card" content="summary_large_image" />

    <script>
      (function(){var t=localStorage.getItem('autoceny_theme');if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');document.querySelector('meta[name="theme-color"]')?.setAttribute('content','#070707')}})();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Critical font — preloaded -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&subset=latin,latin-ext&display=swap"
      onload="this.rel='stylesheet'"
    />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&subset=latin,latin-ext&display=swap" /></noscript>
    <!-- Non-critical fonts — deferred (Albert Sans only needs 400;600;700 for landing headlines) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Sora:wght@600;700&subset=latin,latin-ext&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Sora:wght@600;700&subset=latin,latin-ext&display=swap" /></noscript>
