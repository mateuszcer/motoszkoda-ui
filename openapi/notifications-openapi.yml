openapi: 3.0.3
info:
  title: MotoSzkoda Notifications API
  description: In-app notifications for drivers and shop owners, created reactively from domain events.
  version: 1.0.0

paths:
  /api/notifications:
    get:
      summary: List notifications
      description: >
        Returns paginated notifications for the authenticated user, newest first.
        Supports cursor-based pagination via the `before` query parameter.
      operationId: listNotifications
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
          description: Number of notifications to return (default 20, max 50).
        - name: before
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: ISO-8601 cursor — return only notifications created before this timestamp.
      responses:
        '200':
          description: Paginated list of notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPageResponse'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/notifications/unread-count:
    get:
      summary: Get unread notification count
      description: Returns the number of unread notifications for the authenticated user. Useful for badge display.
      operationId: getUnreadCount
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnreadCountResponse'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/notifications/{id}/read:
    patch:
      summary: Mark a single notification as read
      description: >
        Marks the specified notification as read. The notification must belong to the authenticated user.
        Idempotent — calling on an already-read notification is a no-op.
      operationId: markNotificationRead
      tags: [Notifications]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/notificationId'
      responses:
        '200':
          description: Notification marked as read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Notification not found or does not belong to caller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/notifications/read-all:
    patch:
      summary: Mark all notifications as read
      description: Bulk-marks all unread notifications for the authenticated user as read.
      operationId: markAllNotificationsRead
      tags: [Notifications]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: All notifications marked as read
        '401':
          description: Missing or invalid JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    notificationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: The notification UUID.

  schemas:
    NotificationResponse:
      type: object
      required: [id, type, payload, read, createdAt]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - REQUEST_DELIVERED_TO_SHOP
            - SHOP_ACKNOWLEDGED_REQUEST
            - SHOP_ASKED_QUESTION
            - SHOP_SENT_QUOTE
        payload:
          type: object
          description: Opaque JSON payload rendered by the frontend.
          additionalProperties: true
        read:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationPageResponse:
      type: object
      required: [notifications, hasMore]
      properties:
        notifications:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
        hasMore:
          type: boolean
          description: True if more notifications exist beyond this page.

    UnreadCountResponse:
      type: object
      required: [count]
      properties:
        count:
          type: integer
          format: int64
          description: Number of unread notifications.

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: NOTIFICATION_NOT_FOUND
        message:
          type: string
        details:
          type: array
          items:
            type: string
        correlationId:
          type: string
          format: uuid
