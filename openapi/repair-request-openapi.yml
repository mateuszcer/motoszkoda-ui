openapi: 3.0.3
info:
  title: Repair Request API
  description: API for drivers to create, manage, and close repair requests.
  version: 1.0.0

paths:
  /api/repair-requests:
    post:
      summary: Create a repair request
      operationId: createRepairRequest
      tags: [RepairRequest]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRepairRequestRequest'
      responses:
        '201':
          description: Repair request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairRequestResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized — missing or invalid JWT
        '403':
          description: Forbidden — caller is not a USER
        '429':
          description: Limit exceeded — daily limit or max open requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List my repair requests
      operationId: getMyRepairRequests
      tags: [RepairRequest]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of caller's repair requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RepairRequestResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /api/repair-requests/{id}:
    get:
      summary: Get a repair request by ID
      operationId: getRepairRequest
      tags: [RepairRequest]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Repair request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairRequestResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — caller is not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Repair request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update an open repair request
      operationId: updateRepairRequest
      tags: [RepairRequest]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRepairRequestRequest'
      responses:
        '200':
          description: Repair request updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairRequestResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — caller is not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Repair request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — repair request is not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/repair-requests/{id}/close:
    post:
      summary: Close an open repair request
      operationId: closeRepairRequest
      tags: [RepairRequest]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Repair request closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepairRequestResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden — caller is not the owner
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Repair request not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict — repair request is not open
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CreateRepairRequestRequest:
      type: object
      required: [make, model, year, description, latitude, longitude, radiusKm]
      properties:
        vin:
          type: string
          pattern: '^[A-HJ-NPR-Za-hj-npr-z0-9]{17}$'
          description: Vehicle Identification Number (optional)
        make:
          type: string
          maxLength: 100
        model:
          type: string
          maxLength: 100
        variant:
          type: string
          maxLength: 200
        year:
          type: integer
          minimum: 1900
          maximum: 2030
        engineType:
          type: string
          maxLength: 50
        fuelType:
          type: string
          maxLength: 30
        mileageKm:
          type: integer
          minimum: 0
        description:
          type: string
          maxLength: 5000
        categories:
          type: array
          items:
            type: string
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        radiusKm:
          type: integer
          minimum: 1
          maximum: 100
        urgency:
          type: string
          enum: [ASAP, THIS_WEEK, FLEXIBLE]

    UpdateRepairRequestRequest:
      type: object
      required: [make, model, year, description, latitude, longitude, radiusKm]
      properties:
        vin:
          type: string
          pattern: '^[A-HJ-NPR-Za-hj-npr-z0-9]{17}$'
        make:
          type: string
          maxLength: 100
        model:
          type: string
          maxLength: 100
        variant:
          type: string
          maxLength: 200
        year:
          type: integer
          minimum: 1900
          maximum: 2030
        engineType:
          type: string
          maxLength: 50
        fuelType:
          type: string
          maxLength: 30
        mileageKm:
          type: integer
          minimum: 0
        description:
          type: string
          maxLength: 5000
        categories:
          type: array
          items:
            type: string
        latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        radiusKm:
          type: integer
          minimum: 1
          maximum: 100
        urgency:
          type: string
          enum: [ASAP, THIS_WEEK, FLEXIBLE]

    RepairRequestResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        driverId:
          type: string
          format: uuid
        status:
          type: string
          enum: [OPEN, CLOSED, EXPIRED]
        vin:
          type: string
        make:
          type: string
        model:
          type: string
        variant:
          type: string
        year:
          type: integer
        engineType:
          type: string
        fuelType:
          type: string
        mileageKm:
          type: integer
        description:
          type: string
        categories:
          type: array
          items:
            type: string
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        radiusKm:
          type: integer
        urgency:
          type: string
          enum: [ASAP, THIS_WEEK, FLEXIBLE]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          description: Machine-readable error code
          enum:
            - REPAIR_REQUEST_NOT_FOUND
            - REPAIR_REQUEST_ACCESS_DENIED
            - REPAIR_REQUEST_NOT_OPEN
            - LIMIT_EXCEEDED
            - VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error message
        details:
          type: array
          items:
            type: string
        correlationId:
          type: string
          format: uuid
