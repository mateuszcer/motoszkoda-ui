openapi: 3.1.0
info:
  title: MotoSzkoda Enrollment API
  description: Shop enrollment endpoints — registration, voucher redemption, subscription payment, and admin management.
  version: 4.0.0

paths:
  /api/enrollment/plans:
    get:
      summary: Get enrollment pricing
      description: Public endpoint returning shop enrollment pricing. No authentication required.
      operationId: getEnrollmentPlanCatalog
      tags: [Enrollment - Pricing]
      responses:
        '200':
          description: Enrollment pricing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentPlanCatalog'

  /api/enrollment/register:
    post:
      operationId: registerShop
      summary: Register a new shop with profile and enrollment
      description: |
        Combined signup + profile creation + enrollment in PENDING_PAYMENT state. Public endpoint, no JWT required.
        Requires billing information (legalName, nip, billingStreet, billingCity, billingPostalCode) for VAT invoicing.
        Terms acceptance timestamp is set server-side.
      tags: [Enrollment - Registration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShopRegistrationRequest"
      responses:
        "201":
          description: Shop registered, enrollment created in PENDING_PAYMENT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopRegistrationResponse"
        "400":
          description: Validation error or weak password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/enrollment/voucher:
    post:
      operationId: redeemVoucher
      summary: Redeem a voucher code to activate enrollment
      tags: [Enrollment - Shop]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollWithVoucherRequest"
      responses:
        "201":
          description: Voucher redeemed, enrollment now ACTIVE
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentResponse"
        "404":
          description: Voucher not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Voucher already redeemed or invalid enrollment state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/enrollment/payment:
    post:
      operationId: initiatePayment
      summary: Initiate enrollment subscription payment
      description: |
        Creates a Stripe Customer and Subscription with `payment_behavior=default_incomplete`.
        Returns `subscriptionId` and `clientSecret` from the first invoice's PaymentIntent.
        Frontend uses `clientSecret` with Stripe.js to confirm payment.
        Requires a `billingInterval` to select monthly or annual pricing.
      tags: [Enrollment - Shop]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiatePaymentRequest"
      responses:
        "200":
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "409":
          description: Invalid enrollment state (already active)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/enrollment/status:
    get:
      operationId: getEnrollmentStatus
      summary: Get own enrollment status
      tags: [Enrollment - Shop]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current enrollment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentStatusResponse"
        "404":
          description: No enrollment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/enrollment/portal:
    post:
      operationId: createEnrollmentPortalSession
      summary: Create Stripe Customer Portal session for subscription management
      description: |
        Creates a Stripe Customer Portal session so shop owners can manage their subscription
        (cancel, reverse cancellation, update payment method). Requires an active Stripe subscription.
      tags: [Enrollment - Shop]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalResponse"
        "404":
          description: No enrollment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: No active subscription (no Stripe customer ID)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/webhook/stripe:
    post:
      operationId: stripeWebhook
      summary: Stripe webhook endpoint
      description: |
        Receives Stripe webhook events. Verifies signature via `Stripe-Signature` header.
        Handles `invoice.paid` (activate/unsuspend), `invoice.payment_failed` (suspend),
        `customer.subscription.updated` (schedule/reverse cancellation),
        and `customer.subscription.deleted` (suspend). Always returns 200 to acknowledge.
        Idempotent via `stripe_webhook_event` table.
      tags: [Enrollment - Webhook]
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
          description: Stripe webhook signature for verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Stripe Event object
      responses:
        "200":
          description: Event acknowledged
        "400":
          description: Signature verification failed

  /api/admin/enrollment/shops/{shopId}/suspend:
    post:
      operationId: suspendShop
      summary: Suspend a shop
      tags: [Enrollment - Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Shop suspended
        "404":
          description: Enrollment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Shop already suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/enrollment/shops/{shopId}/unsuspend:
    post:
      operationId: unsuspendShop
      summary: Unsuspend a shop
      tags: [Enrollment - Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: shopId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Shop unsuspended
        "404":
          description: Enrollment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Shop not suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/admin/enrollment/vouchers:
    post:
      operationId: createVoucher
      summary: Create a voucher code
      tags: [Enrollment - Admin]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVoucherRequest"
      responses:
        "201":
          description: Voucher created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoucherResponse"
        "400":
          description: Invalid code format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Code already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ShopRegistrationRequest:
      type: object
      required: [email, password, name, address, legalName, nip, billingStreet, billingCity, billingPostalCode, lat, lon]
      properties:
        email:
          type: string
          format: email
          example: shop@example.com
        password:
          type: string
          format: password
          example: StrongPass1!
        captchaToken:
          type: string
          description: Turnstile CAPTCHA token from the frontend
        name:
          type: string
          example: AutoSerwis Kowalski
        address:
          type: string
          example: ul. Mechaniczna 5, 00-001 Warszawa
        contactPhoneE164:
          type: string
          pattern: '^\+[1-9]\d{6,14}$'
          description: Contact phone in E.164 format
          example: "+48123456789"
        contactEmail:
          type: string
          format: email
          description: Contact email (optional)
          example: kontakt@autoserwis.pl
        description:
          type: string
          example: Specjalizujemy się w naprawach silników.
        lat:
          type: number
          format: double
          example: 52.2297
        lon:
          type: number
          format: double
          example: 21.0122
        legalName:
          type: string
          maxLength: 500
          description: Legal business name for invoicing
          example: AutoSerwis Kowalski Sp. z o.o.
        nip:
          type: string
          pattern: '^\d{10}$'
          description: Polish NIP (tax ID), 10 digits with valid checksum
          example: "5261040828"
        billingStreet:
          type: string
          maxLength: 500
          description: Billing address street
          example: ul. Mechaniczna 5
        billingCity:
          type: string
          maxLength: 200
          description: Billing address city
          example: Warszawa
        billingPostalCode:
          type: string
          maxLength: 20
          description: Billing address postal code
          example: "00-001"
        billingCountry:
          type: string
          maxLength: 3
          description: Billing country ISO code (defaults to PL)
          default: PL
          example: PL
        invoiceEmail:
          type: string
          format: email
          description: Email for invoices (optional, defaults to registration email)
          example: faktury@autoserwis.pl
        termsVersion:
          type: string
          maxLength: 50
          description: Version of terms accepted (optional)
          example: "1.0"

    ShopRegistrationResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        shopId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        enrollmentStatus:
          $ref: "#/components/schemas/EnrollmentStatus"

    EnrollWithVoucherRequest:
      type: object
      required: [voucherCode]
      properties:
        voucherCode:
          type: string
          minLength: 6
          maxLength: 30
          pattern: "^[a-zA-Z0-9]+$"
          example: FREESHOP2024

    EnrollmentResponse:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/EnrollmentStatus"

    SubscriptionResponse:
      type: object
      properties:
        subscriptionId:
          type: string
          description: Stripe Subscription ID
          example: sub_1abc123def456
        clientSecret:
          type: string
          description: PaymentIntent client secret for Stripe.js confirmation
          example: pi_3abc123def456_secret_xyz

    CreateVoucherRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          minLength: 6
          maxLength: 30
          pattern: "^[a-zA-Z0-9]+$"
          example: FREESHOP2024

    VoucherResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: FREESHOP2024

    BillingInterval:
      type: string
      enum: [MONTHLY, ANNUAL]
      description: Billing cycle for the enrollment subscription

    InitiatePaymentRequest:
      type: object
      required: [billingInterval]
      properties:
        billingInterval:
          $ref: "#/components/schemas/BillingInterval"

    EnrollmentStatusResponse:
      type: object
      properties:
        shopId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/EnrollmentStatus"
        cancelAt:
          type: string
          format: date-time
          description: Scheduled cancellation timestamp (only present when status is CANCEL_SCHEDULED)

    PortalResponse:
      type: object
      properties:
        portalUrl:
          type: string
          format: uri
          description: Stripe Customer Portal session URL

    EnrollmentStatus:
      type: string
      enum: [PENDING_PAYMENT, ACTIVE, CANCEL_SCHEDULED, SUSPENDED]

    EnrollmentPlanCatalog:
      type: object
      required: [currency, prices]
      properties:
        currency:
          type: string
          example: PLN
        prices:
          type: array
          items:
            $ref: '#/components/schemas/EnrollmentPlanPrice'

    EnrollmentPlanPrice:
      type: object
      required: [billingInterval, price]
      properties:
        billingInterval:
          type: string
          enum: [MONTHLY, ANNUAL]
        price:
          type: integer
          description: Price in minor currency units (grosze for PLN)
          example: 12000

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
        correlationId:
          type: string
          format: uuid
